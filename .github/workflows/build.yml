name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    - name: List Android SDK components
      run: sdkmanager --list
    - name: Install required Android SDK components
      run: |
        yes | sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"
    - name: Build with Gradle
      run: cd android && ./gradlew assembleDebug --stacktrace --info
    - name: Check build output
      run: ls -la android/app/build/outputs/apk/debug/
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error