name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew
    
    - name: Install Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        sudo mkdir -p $ANDROID_HOME/cmdline-tools
        sudo mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        sudo chmod -R 755 $ANDROID_HOME
    
    - name: Set up Android SDK tools
      run: |
        echo "export ANDROID_HOME=$ANDROID_HOME" >> ~/.bashrc
        echo "export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> ~/.bashrc
        source ~/.bashrc
    
    - name: Install required SDK components
      run: |
        yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-36" "build-tools;35.0.0"
    
    - name: Build with Gradle
      run: |
        cd android
        ./gradlew assembleDebug --no-build-cache --info
    
    - name: Check build output
      run: |
        ls -la android/app/build/outputs/apk/debug/
        if [ ! -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "APK file not found!"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk