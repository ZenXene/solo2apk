name: Upload Local APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download pre-built APK
      run: |
        # Create the directory structure
        mkdir -p android/app/build/outputs/apk/debug
        # Use curl to download a placeholder APK (we'll replace this with the actual one)
        curl -o android/app/build/outputs/apk/debug/app-debug.apk https://example.com/placeholder.apk || true
    
    - name: Check APK file
      run: |
        ls -la android/app/build/outputs/apk/debug/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error